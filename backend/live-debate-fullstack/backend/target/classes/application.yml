server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: live-debate-server
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

# 跨域配置
cors:
  enabled: true
  allowed-origins: "*"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
  allowed-headers: "*"
  max-age: 3600

# 应用配置
app:
  mock:
    enabled: true
    seed: 12345
  websocket:
    enabled: true
    endpoint: "/ws"
  storage:
    enabled: true
    file-path: "./data/data.json"
logging:
  level:
    com.debate: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123
  bucket: recordings
  region: us-east-1
  secure: false  # 因为是 HTTP 本地连接
