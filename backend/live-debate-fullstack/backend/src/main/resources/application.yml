server:
  port: ${PORT:8081}
  servlet:
    context-path: /

spring:
  application:
    name: live-debate-server
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

# 跨域配置
cors:
  enabled: true
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
  allowed-headers: "*"
  max-age: 3600

# 应用配置
app:
  mock:
    enabled: ${MOCK_ENABLED:true}
    seed: 12345
  websocket:
    enabled: ${WEBSOCKET_ENABLED:true}
    endpoint: "/ws"
  storage:
    enabled: ${STORAGE_ENABLED:true}
    file-path: "./data/data.json"
logging:
  level:
    com.debate: ${LOG_LEVEL:DEBUG}
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

minio:
  endpoint: ${MINIO_ENDPOINT:false}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin123}
  bucket: ${MINIO_BUCKET:recordings}
  region: ${MINIO_REGION:us-east-1}
  secure: ${MINIO_SECURE:false}
