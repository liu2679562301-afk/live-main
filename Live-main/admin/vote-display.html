<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>票数统计大屏幕</title>
	<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
	<!-- STOMP over SockJS WebSocket 客户端 -->
	<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6/bundles/stomp.umd.min.js"></script>
	<script src="../utils/stomp-client.js"></script>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

		@font-face {
			font-family: 'DSEG7Classic';
			src: url('https://cdn.jsdelivr.net/npm/dseg7@0.0.1/dist/dseg7classic.woff2') format('woff2'),
				 url('https://cdn.jsdelivr.net/npm/dseg7@0.0.1/dist/dseg7classic.woff') format('woff');
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
			background: linear-gradient(135deg, rgb(26, 35, 38) 0%, rgb(30, 39, 42) 50%, rgb(28, 37, 40) 100%);
			color: white;
			overflow: hidden;
			width: 100vw;
			height: 100vh;
			position: relative;
		}

		body::before {
			content: '';
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background:
				radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03) 0%, transparent 40%),
				radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.02) 0%, transparent 40%);
			pointer-events: none;
			z-index: 0;
		}

		.container {
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			position: relative;
			padding-top: 40px;
			gap: 24px;
			z-index: 1;
		}

		.container::before {
			content: '';
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background:
				radial-gradient(ellipse 800px 600px at 20% 30%, rgba(255, 255, 255, 0.04) 0%, transparent 50%),
				radial-gradient(ellipse 600px 800px at 80% 70%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
				radial-gradient(ellipse 400px 400px at 50% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
			pointer-events: none;
			z-index: 0;
		}

		/* 顶部条状显示区域 */
		.header {
			width: 100%;
			height: 110px;
			display: flex;
			position: relative;
			overflow: hidden;
			margin-bottom: 20px;
		}

		/* 正方区域（左侧红色） */
		.header-left {
			height: 100%;
			background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
			display: flex;
			flex-direction: row;
			align-items: center;
			justify-content: space-between;
			position: relative;
			transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
			box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
			padding: 0 30px;
		}

		.header-left::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: rgba(255, 255, 255, 0.05);
			pointer-events: none;
		}

		/* 反方区域（右侧蓝色） */
		.header-right {
			height: 100%;
			background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
			display: flex;
			flex-direction: row;
			align-items: center;
			justify-content: space-between;
			position: relative;
			transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
			box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
			padding: 0 30px;
		}

		.header-right::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: rgba(255, 255, 255, 0.05);
			pointer-events: none;
		}

		/* 顶部标签文字 */
		.header-label {
			font-size: 32px;
			font-weight: 900;
			color: white;
			text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
			position: relative;
			z-index: 1;
			border: 2px solid rgba(255, 255, 255, 0.9);
			padding: 6px 18px;
			border-radius: 8px;
			background: rgba(255, 255, 255, 0.1);
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		/* 进度条中的票数显示 */
		.header-vote-value {
			font-size: 48px;
			font-weight: 900;
			color: white;
			text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
			position: relative;
			z-index: 1;
			line-height: 1;
			transition: transform 0.3s ease;
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		.header-vote-value.updated {
			animation: numberUpdate 0.5s ease;
		}

		@keyframes numberUpdate {
			0% { transform: scale(1); }
			50% { transform: scale(1.15); }
			100% { transform: scale(1); }
		}

		/* 进度条中的百分比显示 */
		.header-vote-percentage {
			font-size: 24px;
			font-weight: 700;
			color: rgba(255, 255, 255, 0.95);
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
			position: relative;
			z-index: 1;
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		.header-center-content {
			display: flex;
			flex-direction: row;
			align-items: center;
			gap: 12px;
		}

		/* 顶部中间分隔线 */
		.header-divider {
			position: absolute;
			left: 50%;
			top: 0;
			bottom: 0;
			width: 3px;
			background: rgba(255, 255, 255, 0.9);
			box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
			z-index: 10;
			transform: translateX(-50%);
		}

		/* 流信息（右下角小标签） */
		.stream-info {
			position: fixed;
			bottom: 20px;
			right: 20px;
			font-size: 12px;
			color: rgba(255, 255, 255, 0.9);
			background: rgba(0, 0, 0, 0.4);
			padding: 5px 10px;
			border-radius: 12px;
			display: flex;
			align-items: center;
			gap: 5px;
			cursor: pointer;
			transition: background 0.3s ease;
			z-index: 1000;
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.2);
		}

		.stream-info:hover {
			background: rgba(0, 0, 0, 0.6);
		}

		.stream-info.collapsed {
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.3s ease;
		}

		.status-indicator {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			background: #95a5a6;
			animation: pulse 2s infinite;
		}

		.status-indicator.live {
			background: #27ae60;
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.5; }
		}

		/* 计时器和环节控制区域 */
		.timer-section {
			width: 100%;
			padding: 32px 40px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 20px;
		}

		.timer-wrapper {
			width: 100%;
			max-width: 960px;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 36px;
		}

		.timer-info {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 16px;
			flex: 0 1 auto;
			text-align: center;
		}

		.timer-actions {
			display: flex;
			flex-direction: column;
			align-items: flex-start;
			gap: 12px;
			display: none;
		}

		.segment-info {
			font-size: 42px;
			font-weight: 900;
			color: white;
			text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
			text-align: center;
			letter-spacing: 2px;
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		.timer-display {
			font-size: 160px;
			font-weight: 300;
			color: #ffffff;
			font-family: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
			letter-spacing: 12px;
			font-variant-numeric: tabular-nums;
		}

		.timer-display.warning {
			color: #ff6b6b;
		}

		.timer-controls {
			display: flex;
			gap: 16px;
			align-items: center;
			justify-content: flex-start;
		}

		.timer-btn {
			padding: 12px 26px;
			font-size: 15px;
			font-weight: 600;
			border: 1.5px solid rgba(255, 255, 255, 0.3);
			border-radius: 8px;
			background: rgba(255, 255, 255, 0.1);
			color: white;
			cursor: pointer;
			transition: all 0.3s ease;
			backdrop-filter: blur(10px);
		}

		.timer-btn:hover {
			background: rgba(255, 255, 255, 0.2);
			border-color: rgba(255, 255, 255, 0.5);
			transform: translateY(-2px);
		}

		.timer-btn:active {
			transform: translateY(0);
		}

		.timer-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.timer-btn.primary {
			background: rgba(52, 152, 219, 0.3);
			border-color: rgba(52, 152, 219, 0.6);
		}

		.timer-btn.primary:hover {
			background: rgba(52, 152, 219, 0.5);
		}

		.timer-btn.danger {
			background: rgba(231, 76, 60, 0.3);
			border-color: rgba(231, 76, 60, 0.6);
		}

		.timer-btn.danger:hover {
			background: rgba(231, 76, 60, 0.5);
		}

		.segment-controls {
			display: flex;
			gap: 16px;
			align-items: center;
			justify-content: flex-start;
		}

		/* 主内容区 */
		.main-content {
			width: 100%;
			display: flex;
			align-items: stretch;
			justify-content: center;
			padding: 0 40px;
			position: relative;
		}

		/* 票数显示区域 */
		.votes-display {
			width: 100%;
			max-width: 1400px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 30px;
		}

		/* 评委票数区域 */
		.judges-section {
			width: 100%;
			padding: 10px 40px 30px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 24px;
		}

		.judges-title {
			font-size: 26px;
			font-weight: 700;
			color: white;
			text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.45);
			letter-spacing: 2px;
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		.judges-list {
			width: 100%;
			max-width: 1200px;
			display: flex;
			gap: 24px;
			align-items: stretch;
			justify-content: center;
		}

		.judge-card {
			flex: 1 1 0;
			min-width: 220px;
			background: rgba(255, 255, 255, 0.06);
			border: 1px solid rgba(255, 255, 255, 0.12);
			border-radius: 18px;
			padding: 20px 24px;
			display: flex;
			gap: 18px;
			align-items: center;
			box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
			transition: transform 0.3s ease, background 0.3s ease;
		}

		.judge-card:hover {
			transform: translateY(-6px);
			background: rgba(255, 255, 255, 0.1);
		}

		.judge-avatar {
			width: 88px;
			height: 88px;
			border-radius: 50%;
			border: 3px solid rgba(255, 255, 255, 0.35);
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
			flex-shrink: 0;
		}

		.judge-info {
			display: flex;
			flex-direction: column;
			gap: 8px;
			color: white;
			flex: 1;
		}

		.judge-name {
			font-size: 20px;
			font-weight: 700;
			letter-spacing: 1px;
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		.judge-role {
			font-size: 14px;
			color: rgba(255, 255, 255, 0.65);
			letter-spacing: 0.5px;
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		.judge-votes {
			margin-top: 6px;
			display: flex;
			align-items: baseline;
			gap: 10px;
		}

		.judge-votes .label {
			font-size: 14px;
			color: rgba(255, 255, 255, 0.7);
			letter-spacing: 1px;
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		.judge-votes .value {
			font-size: 32px;
			font-weight: 800;
			color: #f5b041;
			text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
			font-family: 'KaiTi', 'Kaiti SC', 'STKaiti', 'Adobe Kaiti Std', '楷体', 'KaiTi_GB2312', serif;
		}

		.judge-votes .value.updated {
			animation: numberUpdate 0.5s ease;
		}

		/* 总票数显示 */
		.total-votes {
			text-align: center;
			background: rgba(0, 0, 0, 0.4);
			padding: 20px 40px;
			border-radius: 16px;
			font-size: 26px;
			font-weight: 600;
			backdrop-filter: blur(10px);
			border: 2px solid rgba(255, 255, 255, 0.2);
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
		}

		.total-label {
			font-size: 20px;
			opacity: 0.9;
			margin-right: 12px;
			color: rgba(255, 255, 255, 0.8);
		}

		.total-value {
			font-size: 36px;
			font-weight: 700;
			color: #f39c12;
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
		}

		/* 加载状态 */
		.loading {
			text-align: center;
			font-size: 20px;
			color: rgba(255, 255, 255, 0.6);
		}

		/* 错误状态 */
		.error {
			text-align: center;
			font-size: 20px;
			color: #e74c3c;
			padding: 30px;
		}

		/* 控制面板（右下角，可选） */
		.control-panel {
			position: fixed;
			bottom: 80px;
			right: 20px;
			background: rgba(0, 0, 0, 0.7);
			padding: 16px;
			border-radius: 10px;
			backdrop-filter: blur(10px);
			display: none;
			z-index: 1000;
			border: 1px solid rgba(255, 255, 255, 0.2);
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
		}

		.control-panel.show {
			display: block;
		}

		.control-panel label {
			display: block;
			margin-bottom: 8px;
			font-size: 12px;
			color: rgba(255, 255, 255, 0.9);
		}

		.control-panel .hint {
			margin-top: 8px;
			font-size: 11px;
			color: rgba(255, 255, 255, 0.6);
			line-height: 1.4;
		}

		.stream-select {
			padding: 7px 10px;
			border: 1px solid rgba(255, 255, 255, 0.3);
			border-radius: 6px;
			background: rgba(255, 255, 255, 0.1);
			color: white;
			font-size: 12px;
			cursor: pointer;
		}

		.stream-select option {
			background: #2c3e50;
			color: white;
		}

		/* 响应式设计 */
		@media (max-width: 1200px) {
			.header {
				height: 100px;
			}

			.header-left,
			.header-right {
				gap: 10px;
			}

			.header-label {
				font-size: 28px;
				padding: 5px 16px;
			}

			.header-vote-value {
				font-size: 40px;
			}

			.header-vote-percentage {
				font-size: 22px;
			}

			.timer-section {
				padding: 28px 28px;
				gap: 18px;
			}

			.segment-info {
				font-size: 36px;
			}

			.timer-display {
				font-size: 130px;
				letter-spacing: 10px;
			}

			.timer-btn {
				padding: 10px 22px;
				font-size: 13px;
			}

			.timer-wrapper {
				flex-direction: column;
				gap: 24px;
			}

			.timer-actions {
				align-items: center;
			}

			.timer-controls,
			.segment-controls {
				justify-content: center;
			}

			.judges-list {
				gap: 20px;
			}

			.main-content {
				padding: 0 24px;
			}

			.judges-section {
				padding: 10px 24px 26px;
			}
		}

		@media (max-width: 768px) {
			.container {
				padding-top: 16px;
				gap: 16px;
			}

			.header {
				height: 90px;
			}

			.header-left,
			.header-right {
				gap: 8px;
			}

			.header-label {
				font-size: 24px;
				padding: 4px 12px;
			}

			.header-vote-value {
				font-size: 32px;
			}

			.header-vote-percentage {
				font-size: 20px;
			}

			.timer-section {
				padding: 16px;
				gap: 12px;
			}

			.segment-info {
				font-size: 30px;
			}

			.timer-display {
				font-size: 110px;
				letter-spacing: 8px;
			}

			.timer-controls,
			.segment-controls {
				flex-wrap: wrap;
				justify-content: center;
			}

			.timer-btn {
				padding: 8px 16px;
				font-size: 12px;
			}

			.timer-wrapper {
				gap: 20px;
			}

			.timer-actions {
				width: 100%;
				align-items: center;
			}

			.judges-section {
				padding: 12px 18px 24px;
				gap: 20px;
			}

			.main-content {
				padding: 0 18px;
			}

			.judges-list {
				flex-direction: column;
				align-items: stretch;
			}

			.judge-card {
				padding: 18px 20px;
			}

			.judge-avatar {
				width: 72px;
				height: 72px;
			}

			.judge-name {
				font-size: 18px;
			}

			.judge-votes .value {
				font-size: 28px;
			}
		}

		.chart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(10px); }
		.chart-container { width: 90%; max-width: 1600px; height: 85%; background: rgba(26,35,38,0.95); border-radius: 24px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.15); position: relative; }
		.chart-title { font-size: 28px; font-weight: 900; color: white; letter-spacing: 2px; margin-bottom: 20px; }
		#vote-trend-chart { width: 100%; height: calc(100% - 60px); }
		.show-chart-btn { position: fixed; bottom: 80px; left: 20px; padding: 12px 24px; font-size: 15px; font-weight: 600; border: 2px solid rgba(52,152,219,0.5); border-radius: 8px; background: rgba(52,152,219,0.15); color: #3498db; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(8px); z-index: 1000; display: none; }
		.show-chart-btn.visible { display: flex; align-items: center; gap: 8px; }
	</style>
</head>
<body>
	<div class="container">
		<!-- 顶部条状显示 -->
		<div class="header" id="header-bar">
			<!-- 正方区域（左侧红色） -->
			<div class="header-left" id="header-left" style="width: 50%;">
				<div class="header-label" id="header-left-label">正方</div>
				<div class="header-center-content">
					<div class="header-vote-percentage" id="header-left-percentage">50%</div>
					<div class="header-vote-value" id="header-left-votes">0</div>
				</div>
			</div>

			<!-- 分隔线 -->
			<div class="header-divider"></div>

			<!-- 反方区域（右侧蓝色） -->
			<div class="header-right" id="header-right" style="width: 50%;">
				<div class="header-center-content">
					<div class="header-vote-value" id="header-right-votes">0</div>
					<div class="header-vote-percentage" id="header-right-percentage">50%</div>
				</div>
				<div class="header-label" id="header-right-label">反方</div>
			</div>

			<!-- 流信息（右下角） -->
			<div class="stream-info" id="stream-info-box" onclick="toggleStreamInfo(event)">
				<span class="status-indicator" id="status-indicator"></span>
				<span id="stream-name">加载中...</span>
			</div>
		</div>

		<!-- 计时器和环节控制区域 -->
		<div class="timer-section" id="timer-section">
			<div class="timer-wrapper">
				<div class="timer-info">
					<div class="segment-info" id="segment-info">准备开始</div>
					<div class="timer-display" id="timer-display">00:00</div>
				</div>
				<div class="timer-actions" style="display: none;">
					<div class="timer-controls">
						<button class="timer-btn" id="btn-pause" onclick="toggleTimer()">暂停</button>
						<button class="timer-btn primary" id="btn-resume" onclick="resumeTimer()" style="display: none;">恢复</button>
						<button class="timer-btn danger" onclick="resetTimer()">重置</button>
					</div>
					<div class="segment-controls">
						<button class="timer-btn" onclick="previousSegment()" id="btn-prev">上一个环节 (←)</button>
						<button class="timer-btn primary" onclick="nextSegment()" id="btn-next">下一个环节 (→)</button>
					</div>
				</div>
			</div>
		</div>

		<!-- 主内容区 -->
		<div class="main-content" id="main-content" style="display: none;">
			<div id="error" class="error" style="display: none;"></div>

			<div id="votes-display" class="votes-display" style="display: none;">
			</div>
		</div>

		<!-- 评委票数展示 -->
		<div class="judges-section" id="judges-section">
			<div class="judges-title">评委票数</div>
			<div class="judges-list" id="judges-list">
				<!-- 由脚本渲染 -->
			</div>
		</div>

		<!-- 控制面板（按F12或点击流信息显示） -->
		<div class="control-panel" id="control-panel">
			<label>选择直播流：</label>
			<select id="stream-select" class="stream-select">
				<option value="">加载中...</option>
			</select>
			<div class="hint">
				提示：<br>
				• 按 F12 或点击右下角流信息可显示/隐藏此面板<br>
				• 可通过URL参数指定流：?stream_id=xxx
			</div>
		</div>
	</div>

	<div class="chart-overlay" id="chart-overlay" onclick="hideVoteTrendChart()">
		<div class="chart-container" onclick="event.stopPropagation()">
			<div class="chart-title">双方票数变化趋势</div>
			<div id="vote-trend-chart"></div>
		</div>
	</div>

	<button class="show-chart-btn" id="show-chart-btn">查看票数趋势</button>

	<script>
		// 服务器配置（从admin.js继承或使用默认值）
		const getAPIBase = () => {
			if (window.SERVER_CONFIG && window.SERVER_CONFIG.BASE_URL) {
				return window.SERVER_CONFIG.BASE_URL;
			}
			return 'http://localhost:8081';
		};

		// 全局状态
		let currentStreamId = null;
		let refreshTimer = null;
		let ws = null;
		const voteHistory = [];
		let voteTrendChart = null;
		let debateStartTime = null;
		let chartShown = false;

		// 辩论流程配置（可动态更新）
		let DEBATE_SEGMENTS = [
			{ name: '正方发言', duration: 180, side: 'left' },      // 3分钟
			{ name: '反方质问', duration: 120, side: 'right' },     // 2分钟
			{ name: '反方发言', duration: 180, side: 'right' },      // 3分钟
			{ name: '正方质问', duration: 120, side: 'left' },       // 2分钟
			{ name: '自由辩论', duration: 300, side: 'both' },      // 5分钟
			{ name: '正方总结', duration: 120, side: 'left' },      // 2分钟
			{ name: '反方总结', duration: 120, side: 'right' }      // 2分钟
		];

		// 计时器状态
		let timerState = {
			currentSegmentIndex: -1,  // -1表示未开始
			remainingSeconds: 0,
			isRunning: false,
			isPaused: false,
			timerInterval: null
		};

		// 评委默认数据（后续可接入后台）
		const DEFAULT_JUDGES = [
			{
				id: 'judge-1',
				name: '评委一',
				role: '主评委',
				avatar: './assets/images/judges/osmanthus.jpg',
				votes: 0
			},
			{
				id: 'judge-2',
				name: '评委二',
				role: '嘉宾评委',
				avatar: './assets/images/judges/osmanthus.jpg',
				votes: 0
			},
			{
				id: 'judge-3',
				name: '评委三',
				role: '嘉宾评委',
				avatar: './assets/images/judges/osmanthus.jpg',
				votes: 0
			}
		];

		let judgeState = [...DEFAULT_JUDGES];

		// 切换流信息显示/隐藏
		function toggleStreamInfo(event) {
			event.stopPropagation();
			const box = document.getElementById('stream-info-box');
			if (box.classList.contains('collapsed')) {
				box.classList.remove('collapsed');
			} else {
				box.classList.add('collapsed');
			}
		}

		// 从URL参数获取stream_id
		function getStreamIdFromURL() {
			const params = new URLSearchParams(window.location.search);
			return params.get('stream_id') || params.get('streamId');
		}

		// 初始化
		document.addEventListener('DOMContentLoaded', async () => {
			// 显示控制面板（按F12或点击右上角）
			document.addEventListener('keydown', (e) => {
				if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
					e.preventDefault();
					const panel = document.getElementById('control-panel');
					panel.classList.toggle('show');
				}
				// 键盘快捷键
				if (e.key === 'ArrowLeft' && !e.ctrlKey && !e.shiftKey) {
					e.preventDefault();
					previousSegment();
				}
				if (e.key === 'ArrowRight' && !e.ctrlKey && !e.shiftKey) {
					e.preventDefault();
					nextSegment();
				}
				if (e.key === ' ' && !e.ctrlKey && !e.shiftKey) {
					e.preventDefault();
					resumeTimer();
				}
				if (e.key === 'p' || e.key === 'P') {
					if (!e.ctrlKey && !e.shiftKey) {
						e.preventDefault();
						toggleTimer();
					}
				}
			});

			// 点击右上角流信息也可以显示控制面板
			document.getElementById('stream-name').addEventListener('click', () => {
				const panel = document.getElementById('control-panel');
				panel.classList.toggle('show');
			});

			// 初始化计时器显示
			updateTimerDisplay();
			updateSegmentInfo();

			// 渲染评委信息
			renderJudges(judgeState);

			// 加载直播流列表
			await loadStreamsList();

			// 初始化WebSocket
			initWebSocket();

			// 开始定时刷新
			startAutoRefresh();
			const chartBtn = document.getElementById('show-chart-btn');
			if (chartBtn) { chartBtn.addEventListener('click', () => { showVoteTrendChart(); }); }
		});

		// 渲染评委区域
		function renderJudges(judges) {
			const listEl = document.getElementById('judges-list');
			if (!listEl) return;

			listEl.innerHTML = '';

			judges.forEach((judge) => {
				const card = document.createElement('div');
				card.className = 'judge-card';
				card.setAttribute('data-judge-id', judge.id);

				const avatar = document.createElement('div');
				avatar.className = 'judge-avatar';
				if (judge.avatar) {
					avatar.style.backgroundImage = `url('${judge.avatar}')`;
				} else {
					avatar.style.backgroundImage = `linear-gradient(135deg, #666, #444)`;
				}

				const info = document.createElement('div');
				info.className = 'judge-info';

				const nameEl = document.createElement('div');
				nameEl.className = 'judge-name';
				nameEl.textContent = judge.name;

				const roleEl = document.createElement('div');
				roleEl.className = 'judge-role';
				roleEl.textContent = judge.role || '';

				const votesWrap = document.createElement('div');
				votesWrap.className = 'judge-votes';

				const label = document.createElement('span');
				label.className = 'label';
				label.textContent = '票数';

				const value = document.createElement('span');
				value.className = 'value';
				value.id = `${judge.id}-votes`;
				value.textContent = judge.votes ?? 0;

				votesWrap.appendChild(label);
				votesWrap.appendChild(value);

				info.appendChild(nameEl);
				if (judge.role) {
					info.appendChild(roleEl);
				}
				info.appendChild(votesWrap);

				card.appendChild(avatar);
				card.appendChild(info);

				listEl.appendChild(card);
			});
		}

		// 更新单个评委票数
		function updateJudgeVotes(judgeId, votes) {
			const judge = judgeState.find(item => item.id === judgeId);
			if (!judge) return;
			judge.votes = Math.max(0, Number(votes) || 0);

			const valueEl = document.getElementById(`${judgeId}-votes`);
			if (valueEl) {
				valueEl.textContent = judge.votes;
				valueEl.classList.add('updated');
				setTimeout(() => valueEl.classList.remove('updated'), 600);
			}
		}

		// 批量更新评委信息
		function setJudges(data = []) {
			if (!Array.isArray(data) || data.length === 0) return;
			judgeState = data.map((item, idx) => ({
				...DEFAULT_JUDGES[idx],
				...item
			}));
			renderJudges(judgeState);
		}

		// 格式化时间显示（MM:SS）
		function formatTime(seconds) {
			const mins = Math.floor(seconds / 60);
			const secs = seconds % 60;
			return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
		}

		// 更新计时器显示
		function updateTimerDisplay() {
			const timerEl = document.getElementById('timer-display');
			timerEl.textContent = formatTime(timerState.remainingSeconds);

			// 剩余时间少于30秒时显示警告
			if (timerState.remainingSeconds <= 30 && timerState.remainingSeconds > 0) {
				timerEl.classList.add('warning');
			} else {
				timerEl.classList.remove('warning');
			}
		}

		// 更新环节信息显示
		function updateSegmentInfo() {
			const segmentInfoEl = document.getElementById('segment-info');
			const btnPrev = document.getElementById('btn-prev');
			const btnNext = document.getElementById('btn-next');

			if (timerState.currentSegmentIndex === -1) {
				segmentInfoEl.textContent = '准备开始';
				btnPrev.disabled = true;
				btnNext.disabled = false;
			} else if (timerState.currentSegmentIndex >= DEBATE_SEGMENTS.length) {
				segmentInfoEl.textContent = '辩论结束';
				btnPrev.disabled = false;
				btnNext.disabled = true;
				const chartBtn = document.getElementById('show-chart-btn');
				if (chartBtn) { chartBtn.classList.add('visible'); }
			} else {
				const segment = DEBATE_SEGMENTS[timerState.currentSegmentIndex];
				segmentInfoEl.textContent = segment.name;
				btnPrev.disabled = false;
				btnNext.disabled = false;
			}
		}

		// 开始计时器
		function startTimer() {
			if (timerState.timerInterval) {
				clearInterval(timerState.timerInterval);
			}

			timerState.isRunning = true;
			timerState.isPaused = false;

			timerState.timerInterval = setInterval(() => {
				if (timerState.remainingSeconds > 0) {
					timerState.remainingSeconds--;
					updateTimerDisplay();

					// 时间到
					if (timerState.remainingSeconds === 0) {
						stopTimer();
						console.log('时间到！');
					}
				} else {
					stopTimer();
				}
			}, 1000);

			updateButtonStates();
		}

		// 停止计时器
		function stopTimer() {
			if (timerState.timerInterval) {
				clearInterval(timerState.timerInterval);
				timerState.timerInterval = null;
			}
			timerState.isRunning = false;
			updateButtonStates();
		}

		// 暂停/恢复计时器
		function toggleTimer() {
			if (timerState.isRunning) {
				stopTimer();
				timerState.isPaused = true;
			} else if (timerState.isPaused && timerState.remainingSeconds > 0) {
				startTimer();
			}
			updateButtonStates();
		}

		// 恢复计时器
		function resumeTimer() {
			if (timerState.isPaused && timerState.remainingSeconds > 0) {
				startTimer();
			} else if (timerState.currentSegmentIndex >= 0 && timerState.remainingSeconds > 0) {
				startTimer();
			}
			updateButtonStates();
		}

		// 重置计时器
		function resetTimer() {
			stopTimer();
			if (timerState.currentSegmentIndex >= 0 && timerState.currentSegmentIndex < DEBATE_SEGMENTS.length) {
				const segment = DEBATE_SEGMENTS[timerState.currentSegmentIndex];
				timerState.remainingSeconds = segment.duration;
				timerState.isPaused = false;
				updateTimerDisplay();
				updateButtonStates();
			}
		}

		// 更新按钮状态
		function updateButtonStates() {
			const btnPause = document.getElementById('btn-pause');
			const btnResume = document.getElementById('btn-resume');

			if (timerState.isRunning) {
				btnPause.style.display = 'inline-block';
				btnResume.style.display = 'none';
			} else if (timerState.isPaused || (timerState.currentSegmentIndex >= 0 && timerState.remainingSeconds > 0)) {
				btnPause.style.display = 'none';
				btnResume.style.display = 'inline-block';
			} else {
				btnPause.style.display = 'inline-block';
				btnResume.style.display = 'none';
			}
		}

		// 切换到下一个环节
		function nextSegment() {
			stopTimer();

			if (timerState.currentSegmentIndex < DEBATE_SEGMENTS.length - 1) {
				timerState.currentSegmentIndex++;
				const segment = DEBATE_SEGMENTS[timerState.currentSegmentIndex];
				timerState.remainingSeconds = segment.duration;
				timerState.isPaused = false;

				updateTimerDisplay();
				updateSegmentInfo();
				updateButtonStates();
			} else if (timerState.currentSegmentIndex === DEBATE_SEGMENTS.length - 1) {
				timerState.currentSegmentIndex = DEBATE_SEGMENTS.length;
				timerState.remainingSeconds = 0;
				updateTimerDisplay();
				updateSegmentInfo();
				updateButtonStates();
			} else if (timerState.currentSegmentIndex === -1) {
				timerState.currentSegmentIndex = 0;
				const segment = DEBATE_SEGMENTS[0];
				timerState.remainingSeconds = segment.duration;
				timerState.isPaused = false;

				updateTimerDisplay();
				updateSegmentInfo();
				updateButtonStates();
			}
		}

		// 切换到上一个环节
		function previousSegment() {
			stopTimer();

			if (timerState.currentSegmentIndex > 0) {
				timerState.currentSegmentIndex--;
				const segment = DEBATE_SEGMENTS[timerState.currentSegmentIndex];
				timerState.remainingSeconds = segment.duration;
				timerState.isPaused = false;

				updateTimerDisplay();
				updateSegmentInfo();
				updateButtonStates();
			} else if (timerState.currentSegmentIndex === 0) {
				timerState.currentSegmentIndex = -1;
				timerState.remainingSeconds = 0;
				updateTimerDisplay();
				updateSegmentInfo();
				updateButtonStates();
			}
		}

		// 加载直播流列表
		async function loadStreamsList() {
			try {
				const response = await fetch(`${getAPIBase()}/api/v1/admin/streams`);
				const result = await response.json();

				const streams = result?.data?.streams || result?.streams || (Array.isArray(result) ? result : []);
				const select = document.getElementById('stream-select');

				select.innerHTML = '<option value="">请选择直播流</option>';

				if (streams.length === 0) {
					select.innerHTML += '<option value="" disabled>暂无可用的直播流</option>';
					return;
				}

				streams.forEach(stream => {
					if (stream.enabled) {
						const option = document.createElement('option');
						option.value = stream.id;
						option.textContent = `${stream.name} (${stream.type?.toUpperCase() || 'HLS'})`;
						select.appendChild(option);
					}
				});

				const urlStreamId = getStreamIdFromURL();
				let selectedStreamId = null;

				if (urlStreamId) {
					const urlStream = streams.find(s => s.id === urlStreamId && s.enabled);
					if (urlStream) {
						selectedStreamId = urlStreamId;
						select.value = urlStreamId;
					}
				}

				if (!selectedStreamId) {
					const firstEnabled = streams.find(s => s.enabled);
					if (firstEnabled) {
						selectedStreamId = firstEnabled.id;
						select.value = firstEnabled.id;
					}
				}

				if (selectedStreamId) {
					currentStreamId = selectedStreamId;
					await loadVotes(selectedStreamId);
				}

				select.addEventListener('change', async (e) => {
					const streamId = e.target.value;
					if (streamId) {
						currentStreamId = streamId;
						const url = new URL(window.location);
						url.searchParams.set('stream_id', streamId);
						window.history.pushState({}, '', url);
						await loadVotes(streamId);
					}
				});
			} catch (error) {
				console.error('加载直播流列表失败:', error);
			}
		}

		// 加载票数数据
		async function loadVotes(streamId, showLoadingState = true) {
			if (!streamId) {
				return;
			}

			try {
				const response = await fetch(`${getAPIBase()}/api/v1/admin/dashboard?stream_id=${streamId}`);
				const result = await response.json();

				const data = result?.data || result;

				if (!data) {
					throw new Error('无法获取票数数据');
				}

				const streamSelect = document.getElementById('stream-select');
				const selectedOption = streamSelect?.options[streamSelect.selectedIndex];
				const streamName = selectedOption ? selectedOption.textContent : '未知流';
				document.getElementById('stream-name').textContent = streamName;

				const statusIndicator = document.getElementById('status-indicator');
				if (data.isLive) {
					statusIndicator.classList.add('live');
				} else {
					statusIndicator.classList.remove('live');
				}

				const leftVotes = data.leftVotes || 0;
				const rightVotes = data.rightVotes || 0;
				const totalVotes = data.totalVotes || (leftVotes + rightVotes);
				const leftPercentage = data.leftPercentage || (totalVotes > 0 ? Math.round((leftVotes / totalVotes) * 100) : 50);
				const rightPercentage = data.rightPercentage || (totalVotes > 0 ? Math.round((rightVotes / totalVotes) * 100) : 50);

				updateVotesDisplay(leftVotes, rightVotes, totalVotes, leftPercentage, rightPercentage);
				
				// 🔧 新增：加载该流的辩论流程配置
				await loadDebateFlowConfig(streamId);
			} catch (error) {
				console.error('加载票数失败:', error);
			}
		}
		
		/**
		 * 从API加载辩论流程配置
		 */
		async function loadDebateFlowConfig(streamId) {
			try {
				const response = await fetch(`${getAPIBase()}/api/admin/debate-flow?stream_id=${streamId}`);
				const result = await response.json();
				
				if (result && result.segments && Array.isArray(result.segments) && result.segments.length > 0) {
					// 更新全局 DEBATE_SEGMENTS
					DEBATE_SEGMENTS = result.segments;
					console.log('✅ 已加载自定义辩论流程配置:', DEBATE_SEGMENTS);
				} else {
					console.warn('⚠️ 使用默认辩论流程配置');
				}
			} catch (error) {
				console.warn('⚠️ 加载辩论流程配置失败，使用默认配置:', error);
				// 如果加载失败，继续使用默认配置
			}
		}

		// 更新票数显示
		function updateVotesDisplay(leftVotes, rightVotes, totalVotes, leftPercentage, rightPercentage) {
			const leftEl = document.getElementById('header-left-votes');
			const rightEl = document.getElementById('header-right-votes');
			const leftPctEl = document.getElementById('header-left-percentage');
			const rightPctEl = document.getElementById('header-right-percentage');
			const leftBar = document.getElementById('header-left');
			const rightBar = document.getElementById('header-right');

			const currentLeft = parseInt(leftEl.textContent.replace(/,/g, '')) || 0;
			const currentRight = parseInt(rightEl.textContent.replace(/,/g, '')) || 0;

			if (currentLeft !== leftVotes) {
				leftEl.classList.add('updated');
				setTimeout(() => leftEl.classList.remove('updated'), 500);
			}
			if (currentRight !== rightVotes) {
				rightEl.classList.add('updated');
				setTimeout(() => rightEl.classList.remove('updated'), 500);
			}

			if (totalVotes === 0) {
				leftBar.style.width = '50%';
				rightBar.style.width = '50%';
			} else {
				leftBar.style.width = `${leftPercentage}%`;
				rightBar.style.width = `${rightPercentage}%`;
			}

			leftEl.textContent = formatNumber(leftVotes);
			rightEl.textContent = formatNumber(rightVotes);
			leftPctEl.textContent = `${leftPercentage}%`;
			rightPctEl.textContent = `${rightPercentage}%`;

			if (voteHistory.length === 0) { debateStartTime = new Date(); }
			voteHistory.push({ timestamp: new Date(), leftVotes, rightVotes });
		}

		// 格式化数字（添加千分位）
		function formatNumber(num) {
			return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
		}

		// 初始化WebSocket（用于实时更新）使用STOMP over SockJS
		function initWebSocket() {
			try {
				// 清理之前的连接（如果存在）
				if (ws && ws.disconnect) {
					ws.disconnect();
					ws = null;
				}
				
				// 使用STOMP客户端工厂创建连接
				const stompOptions = {
					endpoint: '/ws',
					reconnectDelay: 5000,
					heartbeatIncoming: 4000,
					heartbeatOutgoing: 4000,
					debug: false,
					onConnect: function(frame) {
						console.log('✅ STOMP WebSocket 已连接', frame);
						// 订阅投票更新主题（主要关注投票变化）
						if (ws && ws.subscribe) {
							ws.voteSubscription = ws.subscribe('/topic/vote-updates', function(body, message) {
								// body 已经是解析后的JSON对象
								handleWebSocketMessage(body);
							});
							console.log('📡 已订阅投票更新主题');
						}
					},
					onError: function(error) {
						console.error('❌ STOMP WebSocket 连接失败', error);
						// 连接失败，安排重连
						setTimeout(() => {
							if (currentStreamId) {
								console.log('🔄 尝试重新连接...');
								initWebSocket();
							}
						}, 5000);
					},
					onDisconnect: function() {
						console.log('🔌 STOMP WebSocket 已断开');
						// 断开连接后，安排重连
						setTimeout(() => {
							if (currentStreamId) {
								console.log('🔄 尝试重新连接...');
								initWebSocket();
							}
						}, 5000);
					}
				};

				// 创建STOMP客户端实例
				ws = StompClientFactory.createStompClient(stompOptions);
				ws.connect();
			} catch (error) {
				console.error('WebSocket 初始化失败:', error);
				// 失败后尝试重连
				setTimeout(() => {
					if (currentStreamId) {
						initWebSocket();
					}
				}, 5000);
			}
		}

		// 处理WebSocket消息
		function handleWebSocketMessage(message) {
			// 兼容后端消息类型映射
			let msgType = message.type;
			if (msgType === 'voteUpdate') {
				msgType = 'votes-updated';
			} else if (msgType === 'liveStatus') {
				// 可以处理直播状态变化，暂时忽略
				return;
			} else if (msgType === 'aiStatus') {
				return;
			} else if (msgType === 'aiContent') {
				return;
			} else if (msgType === 'comment') {
				return;
			} else if (msgType === 'viewersUpdate') {
				return;
			}
			
			if (msgType === 'votes-updated' || msgType === 'vote-updated') {
				const votes = message.data?.votes || message.data || message;
				if (votes.leftVotes !== undefined && votes.rightVotes !== undefined) {
					const totalVotes = votes.totalVotes || (votes.leftVotes + votes.rightVotes);
					const leftPercentage = votes.leftPercentage || (totalVotes > 0 ? Math.round((votes.leftVotes / totalVotes) * 100) : 50);
					const rightPercentage = votes.rightPercentage || (totalVotes > 0 ? Math.round((votes.rightVotes / totalVotes) * 100) : 50);

					updateVotesDisplay(votes.leftVotes, votes.rightVotes, totalVotes, leftPercentage, rightPercentage);
				}
			}
			// 🔧 新增：处理辩论流程更新事件
			else if (msgType === 'debate-flow-updated') {
				const flowData = message.data || message;
				// 检查是否是当前流的更新
				if (flowData.streamId === currentStreamId && flowData.segments) {
					console.log('📢 接收到辩论流程更新:', flowData);
					DEBATE_SEGMENTS = flowData.segments;
					alert('✅ 辩论流程已更新！');
				}
			}
			// 🔧 新增：处理辩论流程控制命令事件
			else if (msgType === 'debate-flow-control') {
				const controlData = message.data || message;
				// 检查是否是当前流的控制
				if (controlData.streamId === currentStreamId) {
					console.log('📢 接收到流程控制命令:', controlData.action);
					// 可在此处处理控制命令，如自动开始计时等
				}
			}
		}

		// 开始自动刷新
		function startAutoRefresh() {
			if (refreshTimer) {
				clearInterval(refreshTimer);
			}

			refreshTimer = setInterval(() => {
				if (currentStreamId) {
					loadVotes(currentStreamId, false);
				}
			}, 5000);
		}

		function initVoteTrendChart() {
			const dom = document.getElementById('vote-trend-chart');
			voteTrendChart = echarts.init(dom);
			updateVoteTrendChart();
		}
		function updateVoteTrendChart() {
			if (!voteTrendChart || voteHistory.length === 0) return;
			const timeLabels = voteHistory.map(item => {
				const date = new Date(item.timestamp);
				const mins = Math.floor((date - debateStartTime) / 1000 / 60);
				const secs = Math.floor((date - debateStartTime) / 1000) % 60;
				return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
			});
			const leftData = voteHistory.map(item => item.leftVotes);
			const rightData = voteHistory.map(item => item.rightVotes);
			const option = {
				backgroundColor: 'transparent',
				tooltip: { trigger: 'axis' },
				legend: { data: ['正方', '反方'], textStyle: { color: '#fff' } },
				xAxis: { type: 'category', data: timeLabels, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.3)' } }, axisLabel: { color: 'rgba(255,255,255,0.8)' } },
				yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(255,255,255,0.3)' } }, axisLabel: { color: 'rgba(255,255,255,0.8)' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } } },
				series: [
					{ name: '正方', type: 'line', smooth: true, data: leftData },
					{ name: '反方', type: 'line', smooth: true, data: rightData }
				]
			};
			voteTrendChart.setOption(option);
		}
		function showVoteTrendChart() {
			const overlay = document.getElementById('chart-overlay');
			overlay.style.display = 'flex';
			if (!voteTrendChart) initVoteTrendChart(); else updateVoteTrendChart();
			chartShown = true;
		}
		function hideVoteTrendChart() {
			const overlay = document.getElementById('chart-overlay');
			overlay.style.display = 'none';
		}

		// 显示/隐藏函数
		function showLoading() {
			const mainContent = document.getElementById('main-content');
			if (mainContent) {
				mainContent.style.display = 'none';
			}
		}

		function hideLoading() {
			// no-op
		}

		function showError(message) {
			document.getElementById('error').textContent = message;
			document.getElementById('error').style.display = 'block';
		}

		function hideError() {
			document.getElementById('error').style.display = 'none';
		}
	</script>
</body>
</html>
